
server.port=8080
spring.application.name=apigateway


# Configuración de Eureka Client 
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

# Habilitar descubrimiento de servicios para el gateway
spring.cloud.discovery.enabled=true

# Definición de rutas para los microservicios
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://productservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/products-api/**

spring.cloud.gateway.routes[1].id=coupon-service
spring.cloud.gateway.routes[1].uri=lb://couponservice
spring.cloud.gateway.routes[1].predicates[0]=Path=/coupons/**