
server.port=8080
spring.application.name=apigateway


# Configuración de Eureka Client 
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

# Habilitar descubrimiento de servicios para el gateway
spring.cloud.discovery.enabled=true

# Definición de rutas para los microservicios
spring.cloud.gateway.routes[0].id=productos-service
spring.cloud.gateway.routes[0].uri=lb://productoservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/productos-api/**

spring.cloud.gateway.routes[1].id=coupon-service
spring.cloud.gateway.routes[1].uri=lb://couponservice
spring.cloud.gateway.routes[1].predicates[0]=Path=/coupons/**

spring.cloud.gateway.routes[2].id=ordenes-service
spring.cloud.gateway.routes[2].uri=lb://ordenesservice
spring.cloud.gateway.routes[2].predicates[0]=Path=/ordenes-api/**

spring.cloud.gateway.routes[3].id=pagos-service
spring.cloud.gateway.routes[3].uri=lb://pagosservice
spring.cloud.gateway.routes[3].predicates[0]=Path=/pagos-api/**